<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder</title>
  <script defer src="script.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">
  <div class="container mx-auto">
    <h1 class="text-3xl font-bold text-center mb-8">Resume Builder</h1>
    
    <div class="bg-white p-6 rounded-lg shadow-lg">
      <h2 class="text-xl font-semibold mb-4">Personal Information</h2>
      
      <form id="resume-form">
        <!-- Name Field -->
        <div class="mb-4">
          <label class="block text-gray-700">Full Name</label>
          <input type="text" id="fullName" class="border p-2 w-full" placeholder="Your Name" required>
        </div>
        
        <!-- Email Field -->
        <div class="mb-4">
          <label class="block text-gray-700">Email</label>
          <input type="email" id="email" class="border p-2 w-full" placeholder="Your Email" required>
        </div>
        
        <!-- Skills Field -->
        <div class="mb-4">
          <label class="block text-gray-700">Skills</label>
          <input type="text" id="skills" class="border p-2 w-full" placeholder="e.g. JavaScript, TypeScript, HTML" required>
        </div>

        <!-- Experience Field -->
        <div class="mb-4">
          <label class="block text-gray-700">Experience</label>
          <textarea id="experience" class="border p-2 w-full" placeholder="Describe your work experience" required></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Generate Resume</button>
      </form>
    </div>

    <!-- Resume Preview -->
    <div id="resume-preview" class="bg-white mt-8 p-6 rounded-lg shadow-lg hidden">
      <h2 class="text-2xl font-bold text-center mb-4">Resume Preview</h2>
      <p id="preview-name" class="text-xl font-semibold"></p>
      <p id="preview-email" class="text-gray-600"></p>
      <p id="preview-skills" class="mt-4"><strong>Skills:</strong></p>
      <p id="preview-experience" class="mt-4"><strong>Experience:</strong></p>
    </div>
  </div>
</body>
</html>
