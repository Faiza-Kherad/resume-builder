<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder</title>
  <script defer src="script.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-r from-pink-100 to-rose-100">
<!-- Resume Form -->
<form id="resume-form" class="max-w-lg mx-auto p-6 bg-gradient-to-r from-pink-100 to-rose-100 shadow-lg rounded-lg">
  <h2 class="text-3xl font-bold text-pink-600 mb-6 text-center">Create Your Resume</h2>
  <div class="mb-6">
    <label for="fullName" class="block text-gray-800 font-semibold">Full Name</label>
    <input id="fullName" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300 transition duration-200" placeholder="Enter your full name" />
  </div>
  <div class="mb-6">
    <label for="email" class="block text-gray-800 font-semibold">Email</label>
    <input id="email" type="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300 transition duration-200" placeholder="Enter your email address" />
  </div>
  <div class="mb-6">
    <label for="skills" class="block text-gray-800 font-semibold">Skills</label>
    <input id="skills" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300 transition duration-200" placeholder="e.g. JavaScript, TypeScript, Graphic Design" />
  </div>
  <div class="mb-6">
    <label for="experience" class="block text-gray-800 font-semibold">Experience</label>
    <textarea id="experience" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300 transition duration-200" placeholder="Briefly describe your experience"></textarea>
  </div>
  <button type="submit" class="w-full bg-pink-600 text-white py-3 rounded-lg hover:bg-pink-700 transition duration-200 font-bold">Generate Resume Preview</button>
</form>

<!-- Resume Preview -->
<div id="resume-preview" class="max-w-lg mx-auto mt-10 p-6 bg-white shadow-lg rounded-lg hidden">
  <h2 class="text-3xl font-bold text-rose-600 mb-4 text-center">Resume Preview</h2>
  <div class="mb-4">
    <h3 class="text-lg font-semibold text-gray-700">Full Name:</h3>
    <p id="preview-name" class="text-gray-900" contenteditable="true"></p>
  </div>
  <div class="mb-4">
    <h3 class="text-lg font-semibold text-gray-700">Email:</h3>
    <p id="preview-email" class="text-gray-900" contenteditable="true"></p>
  </div>
  <div class="mb-4">
    <h3 class="text-lg font-semibold text-gray-700">Skills:</h3>
    <ul id="preview-skills" class="text-gray-900 list-disc ml-5" contenteditable="true"></ul>
  </div>
  <div class="mb-4">
    <h3 class="text-lg font-semibold text-gray-700">Experience:</h3>
    <p id="preview-experience" class="text-gray-900" contenteditable="true"></p>
  </div>
</div>


</body>

</html>
